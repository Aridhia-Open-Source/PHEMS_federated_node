# Example configuration for using existing PostgreSQL database with Dagster
# Merge these values into your main values.yaml file

# Database configuration - ADD these fields
db:
  enforceSSL: false
  name: fndb
  port: 5432
  host: postgres-service  # REQUIRED: Set your PostgreSQL service name or hostname
  user: test             # REQUIRED: Set your database username
  # Option 1: Use existing secret (recommended)
  secret:
    name: backend-secrets
    key: PGPASSWORD
  # Option 2: Set password directly (not recommended for production)
  # password: your_password_here

### Dagster Configuration - MODIFY these values
dagster:
  enabled: true

  # CHANGE: Disable the PostgreSQL subchart
  postgresql:
    enabled: false  # Changed from true
    service:
      port: 5432

  # ADD: Configure connection to existing database
  postgresqlHost: postgres-service  # Or use template: "{{ .Values.db.host }}"
  postgresqlPort: 5432
  postgresqlUsername: test  # Or use template: "{{ .Values.db.user }}"
  postgresqlDatabase: dagster_db  # New database for Dagster (must be created first)
  
  # CHANGE: Don't generate a new secret, use existing one
  generatePostgresqlPasswordSecret: false  # Changed from true
  
  # ADD: Reference to existing secret
  global:
    postgresqlSecretName: backend-secrets
  
  # OR if not using a secret, set password directly:
  # postgresqlPassword: test

  runLauncher:
    type: K8sRunLauncher
    config:
      k8sRunLauncher:
        imagePullPolicy: "Always"
        image:
          repository: localhost:5001/dagster-fn
          tag: "v15"
          pullPolicy: "Always"

        # ADD: Reference to environment config
        envConfigMaps:
          - name: dagster-env-config
        
        # ADD: If database password is in a secret, reference it
        envSecrets:
          - name: backend-secrets

        volumes:
          - name: artifacts-pvc
            persistentVolumeClaim:
              claimName: artifacts-pvc
        volumeMounts:
          - name: artifacts-pvc
            mountPath: /mnt/dagster/artifacts

  dagster-user-deployments:
    enabled: true
    enableSubchart: true

    deployments:
      - name: "dagster-fn"
        port: 3030
        image:
          repository: localhost:5001/dagster-fn
          tag: "v15"
          pullPolicy: "Always"

        # ADD: Reference to environment config
        envConfigMaps:
          - name: dagster-env-config
        
        # ADD: If database password is in a secret, reference it
        envSecrets:
          - name: backend-secrets

        dagsterApiGrpcArgs:
          - "-m"
          - "app.definitions"
