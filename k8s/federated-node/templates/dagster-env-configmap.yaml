{{- if .Values.dagster.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: dagster-env-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: dagster
    {{- include "federated-node.labels" . | nindent 4 }}
data:
  # Database connection configuration for Dagster
  DAGSTER_POSTGRES_HOST: {{ .Values.db.host | default "postgres-service" | quote }}
  DAGSTER_POSTGRES_PORT: {{ .Values.db.port | default "5432" | quote }}
  DAGSTER_POSTGRES_USER: {{ .Values.db.user | default "test" | quote }}
  DAGSTER_POSTGRES_DB: {{ .Values.dagster.postgresqlDatabase | default "dagster_db" | quote }}
  
  # Dagster home directory
  DAGSTER_HOME: {{ .Values.dagster.global.dagsterHome | default "/opt/dagster/dagster_home" | quote }}
  
  # Optional: Add other environment variables your Dagster jobs might need
  {{- if .Values.github.token }}
  # GITHUB_TOKEN should come from a secret, not configmap
  {{- end }}
  
  {{- if .Values.federatedNode }}
  RESULTS_PATH: {{ .Values.federatedNode.volumes.results_path | default "/mnt/results" | quote }}
  {{- end }}
  
  # Add any custom environment variables here
  {{- range $key, $value := .Values.dagster.additionalEnvVars }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
